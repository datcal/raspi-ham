# rtl_tcp config for raspi-ham
# edit these if you know what you're doing
# restart service after changes: sudo systemctl restart rtl-tcp

# bind to all interfaces (needed because IP changes between networks)
RTL_TCP_ADDR="0.0.0.0"

# standard rtl_tcp port - most iOS SDR apps default to this
RTL_TCP_PORT="1234"

# sample rate in Hz
# 1024000 (1.024 MSPS) is safe for Pi Zero W over WiFi
# 2048000 (2.048 MSPS) might work but pushes WiFi bandwidth limit
RTL_TCP_SAMPLE_RATE="1024000"

# number of buffers (default 15 is too low, causes dropouts)
RTL_TCP_BUFFERS="32"

# gain in dB (0 = AGC auto)
RTL_TCP_GAIN="0"
